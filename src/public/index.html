<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WP Content Optimizer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── App shell ───────────────────────────────────────────── */

    .app {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    /* ── Sidebar ─────────────────────────────────────────────── */

    .sidebar {
      width: 248px;
      flex-shrink: 0;
      background: #13161f;
      border-right: 1px solid #1e2435;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 1.1rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      border-bottom: 1px solid #1e2435;
    }

    .sidebar-logo {
      font-size: 1.2rem;
      line-height: 1;
    }

    .sidebar-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: #e2e8f0;
      letter-spacing: 0.01em;
    }

    .sidebar-subtitle {
      font-size: 0.68rem;
      color: #3d4a63;
      margin-top: 0.1rem;
    }

    /* ── Nav ─────────────────────────────────────────────────── */

    .nav {
      flex: 1;
      overflow-y: auto;
      padding: 0.6rem 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .nav-divider {
      height: 1px;
      background: #1e2435;
      margin: 0.4rem 0.25rem;
    }

    .nav-item {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.55rem 0.65rem;
      border-radius: 7px;
      border: none;
      background: none;
      color: #64748b;
      cursor: pointer;
      text-align: left;
      transition: background 0.12s, color 0.12s;
      position: relative;
    }

    .nav-item:hover {
      background: #1a1f2e;
      color: #c4cedd;
    }

    .nav-item[data-state="running"] {
      background: rgba(245, 158, 11, 0.07);
      color: #e2e8f0;
      cursor: default;
    }

    .nav-item[data-state="success"] {
      background: rgba(34, 197, 94, 0.06);
      color: #e2e8f0;
    }

    .nav-item[data-state="error"] {
      background: rgba(239, 68, 68, 0.07);
      color: #e2e8f0;
    }

    .nav-item-icon {
      font-size: 1rem;
      flex-shrink: 0;
      width: 1.2rem;
      text-align: center;
    }

    .nav-item[data-state="running"] .nav-item-icon {
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    .nav-item-body {
      flex: 1;
      min-width: 0;
    }

    .nav-item-label {
      font-size: 0.82rem;
      font-weight: 600;
      color: inherit;
      display: block;
    }

    .nav-item-note {
      font-size: 0.68rem;
      color: #3d4a63;
      display: block;
      margin-top: 0.05rem;
    }

    .nav-item[data-state="running"] .nav-item-note,
    .nav-item[data-state="success"] .nav-item-note,
    .nav-item[data-state="error"] .nav-item-note {
      display: none;
    }

    .nav-state {
      font-size: 0.68rem;
      font-weight: 500;
      color: #3d4a63;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .nav-item[data-state="running"] .nav-state { color: #f59e0b; }
    .nav-item[data-state="success"] .nav-state { color: #22c55e; }
    .nav-item[data-state="error"]   .nav-state { color: #ef4444; }

    /* Status item (special) */
    .nav-status {
      background: linear-gradient(135deg, rgba(79,110,247,0.08), rgba(139,92,246,0.05));
      border: 1px solid rgba(79,110,247,0.2);
      color: #94a3b8;
      margin-bottom: 0.1rem;
    }

    .nav-status:hover {
      background: linear-gradient(135deg, rgba(79,110,247,0.14), rgba(139,92,246,0.09));
      border-color: rgba(79,110,247,0.4);
      color: #e2e8f0;
    }

    .nav-status[data-state="running"] {
      background: rgba(245,158,11,0.07);
      border-color: rgba(245,158,11,0.25);
    }

    .nav-status[data-state="success"] {
      background: rgba(34,197,94,0.07);
      border-color: rgba(34,197,94,0.25);
    }

    .nav-status[data-state="error"] {
      background: rgba(239,68,68,0.07);
      border-color: rgba(239,68,68,0.25);
    }

    /* Options (checkboxes under tools) */
    .nav-options {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
      padding: 0.1rem 0.65rem 0.35rem 2.4rem;
    }

    .nav-option {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.75rem;
      color: #475569;
      cursor: pointer;
      padding: 0.2rem 0;
      user-select: none;
    }

    .nav-option:hover { color: #94a3b8; }

    .nav-option input[type="checkbox"] {
      accent-color: #4f6ef7;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* Sidebar footer */
    .sidebar-footer {
      padding: 0.75rem 0.5rem;
      border-top: 1px solid #1e2435;
    }

    .abort-btn {
      width: 100%;
      background: none;
      border: 1px solid #ef4444;
      color: #ef4444;
      border-radius: 7px;
      padding: 0.45rem 0.75rem;
      font-size: 0.78rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      display: none;
    }

    .abort-btn:hover { background: #ef4444; color: #fff; }

    /* ── AI badge ────────────────────────────────────────────── */

    .ai-badge {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      font-size: 0.6rem;
      font-weight: 700;
      padding: 0.1rem 0.35rem;
      border-radius: 3px;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }

    /* ── Main area ───────────────────────────────────────────── */

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
    }

    .main-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.65rem 1.25rem;
      border-bottom: 1px solid #1e2435;
      flex-shrink: 0;
    }

    .main-label {
      font-size: 0.78rem;
      color: #3d4a63;
      font-weight: 500;
    }

    .main-actions {
      display: flex;
      gap: 0.4rem;
    }

    .tool-btn {
      background: none;
      border: 1px solid #1e2435;
      color: #475569;
      border-radius: 5px;
      padding: 0.25rem 0.65rem;
      font-size: 0.75rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .tool-btn:hover { border-color: #4f6ef7; color: #818cf8; }

    /* ── Report box (Site Status AI report) ──────────────────── */

    .report-box {
      margin: 0.75rem 1.25rem 0;
      background: #0a0d14;
      border: 1px solid #1e2435;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      font-size: 0.85rem;
      line-height: 1.75;
      white-space: pre-wrap;
      word-break: break-word;
      display: none;
      color: #c4cedd;
      flex-shrink: 0;
      max-height: 220px;
      overflow-y: auto;
    }

    /* ── Review panels ───────────────────────────────────────── */

    .review-panel {
      margin: 0.75rem 1.25rem 0;
      background: #0a0d14;
      border: 1px solid rgba(79,110,247,0.35);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      display: none;
      flex-shrink: 0;
    }

    .review-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.2rem;
    }

    .review-panel-header h3 {
      font-size: 0.85rem;
      font-weight: 700;
      color: #e2e8f0;
    }

    .close-btn {
      background: none;
      border: none;
      color: #3d4a63;
      font-size: 1rem;
      line-height: 1;
      cursor: pointer;
      padding: 0.1rem 0.25rem;
      transition: color 0.12s;
    }

    .close-btn:hover { color: #94a3b8; }

    .review-panel p {
      font-size: 0.75rem;
      color: #475569;
      margin-bottom: 0.75rem;
    }

    .review-list {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      max-height: 220px;
      overflow-y: auto;
      margin-bottom: 0.75rem;
    }

    .review-item {
      display: flex;
      align-items: flex-start;
      gap: 0.65rem;
      background: #13161f;
      border: 1px solid #1e2435;
      border-radius: 7px;
      padding: 0.5rem 0.65rem;
      cursor: pointer;
      transition: border-color 0.12s;
    }

    .review-item:hover { border-color: rgba(79,110,247,0.5); }
    .review-item.deselected { opacity: 0.4; }

    .review-item input[type="checkbox"] {
      accent-color: #4f6ef7;
      flex-shrink: 0;
      margin-top: 0.15rem;
      cursor: pointer;
    }

    .review-item-body { flex: 1; min-width: 0; }

    .review-item-filename {
      font-size: 0.78rem;
      font-weight: 600;
      color: #c4cedd;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .review-item-change {
      font-size: 0.7rem;
      color: #475569;
      margin-top: 0.12rem;
    }

    .review-item-change .from { color: #ef4444; text-decoration: line-through; }
    .review-item-change .arrow { color: #4f6ef7; margin: 0 0.3rem; }
    .review-item-change .to { color: #22c55e; }

    .review-item-edit {
      margin-top: 0.35rem;
    }

    .edit-input {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2a3450;
      border-radius: 5px;
      color: #22c55e;
      font-size: 0.75rem;
      font-family: inherit;
      padding: 0.3rem 0.5rem;
      outline: none;
      resize: none;
      line-height: 1.5;
      transition: border-color 0.15s;
    }

    .edit-input:focus { border-color: #4f6ef7; color: #e2e8f0; }
    .edit-input::placeholder { color: #3d4a63; }

    /* ── SEO View ─────────────────────────────────────────── */

    .seo-view {
      flex: 1;
      min-height: 0;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    #seo-list-view {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .seo-view-toolbar {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.55rem 1.25rem;
      border-bottom: 1px solid #1e2435;
      flex-shrink: 0;
    }

    .seo-back-btn {
      background: none;
      border: 1px solid #1e2435;
      color: #475569;
      border-radius: 5px;
      padding: 0.22rem 0.6rem;
      font-size: 0.74rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .seo-back-btn:hover { color: #e2e8f0; border-color: #475569; }

    .seo-view-heading {
      font-size: 0.8rem;
      font-weight: 600;
      color: #94a3b8;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .seo-avg-label {
      font-size: 0.72rem;
      color: #3d4a63;
      flex-shrink: 0;
    }

    .seo-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 0.6rem 1.25rem 1.25rem;
    }

    /* list items */
    .seo-list-item {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.55rem 0.75rem;
      border-radius: 8px;
      border: 1px solid #1e2435;
      background: #0a0d14;
      cursor: pointer;
      transition: border-color 0.12s, background 0.12s;
      margin-bottom: 0.3rem;
    }
    .seo-list-item:hover { border-color: rgba(79,110,247,0.4); background: #0d1120; }

    .score-pill {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.18rem 0.45rem;
      border-radius: 5px;
      flex-shrink: 0;
      min-width: 3rem;
      text-align: center;
    }
    .score-red    { background: rgba(239,68,68,0.15);  color: #ef4444; }
    .score-yellow { background: rgba(245,158,11,0.15); color: #f59e0b; }
    .score-green  { background: rgba(34,197,94,0.15);  color: #22c55e; }

    .seo-list-body { flex: 1; min-width: 0; }
    .seo-list-title {
      font-size: 0.81rem;
      font-weight: 600;
      color: #c4cedd;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .seo-list-issues {
      font-size: 0.69rem;
      color: #3d4a63;
      margin-top: 0.05rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .seo-type-tag   { font-size: 0.64rem; color: #3d4a63; flex-shrink: 0; }
    .seo-chevron    { color: #3d4a63; font-size: 0.78rem; flex-shrink: 0; }
    .seo-noindex-tag {
      font-size: 0.62rem;
      font-weight: 700;
      color: #f59e0b;
      background: rgba(245,158,11,0.12);
      border: 1px solid rgba(245,158,11,0.3);
      border-radius: 4px;
      padding: 0.1rem 0.35rem;
      flex-shrink: 0;
    }

    /* noindex toggle */
    .seo-robots-item {
      background: #0a0d14;
      border: 1px solid #1e2435;
      border-radius: 8px;
      padding: 0.7rem 0.9rem;
      margin-bottom: 0.35rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .seo-robots-item.is-noindex { border-color: rgba(245,158,11,0.3); }

    .seo-toggle {
      position: relative;
      width: 2.4rem;
      height: 1.3rem;
      flex-shrink: 0;
    }
    .seo-toggle input { opacity: 0; width: 0; height: 0; }
    .seo-toggle-track {
      position: absolute;
      inset: 0;
      background: #1e2435;
      border-radius: 1.3rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .seo-toggle input:checked + .seo-toggle-track { background: #f59e0b; }
    .seo-toggle-track::after {
      content: '';
      position: absolute;
      left: 0.15rem;
      top: 0.15rem;
      width: 1rem;
      height: 1rem;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .seo-toggle input:checked + .seo-toggle-track::after { transform: translateX(1.1rem); }

    .seo-robots-label { flex: 1; }
    .seo-robots-label strong { font-size: 0.8rem; color: #c4cedd; font-weight: 600; display: block; }
    .seo-robots-label span  { font-size: 0.69rem; color: #3d4a63; }

    /* detail view */
    .seo-detail-score {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.18rem 0.45rem;
      border-radius: 5px;
      flex-shrink: 0;
    }

    .seo-issue-item {
      background: #0a0d14;
      border: 1px solid #1e2435;
      border-radius: 8px;
      padding: 0.7rem 0.9rem;
      margin-bottom: 0.35rem;
    }
    .seo-issue-item.is-applied { border-color: rgba(34,197,94,0.25); }

    .seo-issue-header {
      display: flex;
      align-items: center;
      gap: 0.55rem;
    }
    .seo-issue-icon { font-size: 0.85rem; flex-shrink: 0; }
    .seo-issue-label { font-size: 0.8rem; font-weight: 600; color: #c4cedd; flex: 1; }

    .seo-fix-btn {
      background: linear-gradient(135deg, rgba(99,102,241,0.14), rgba(139,92,246,0.09));
      border: 1px solid rgba(99,102,241,0.3);
      color: #818cf8;
      border-radius: 5px;
      padding: 0.25rem 0.65rem;
      font-size: 0.71rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }
    .seo-fix-btn:hover { opacity: 0.8; }
    .seo-fix-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .seo-issue-sub {
      font-size: 0.7rem;
      color: #475569;
      margin-top: 0.28rem;
      padding-left: 1.4rem;
    }
    .seo-current-val {
      font-size: 0.69rem;
      color: #3d4a63;
      margin-top: 0.18rem;
      padding-left: 1.4rem;
      font-style: italic;
    }

    .seo-fix-row {
      display: none;
      gap: 0.5rem;
      margin-top: 0.45rem;
      padding-left: 1.4rem;
      align-items: flex-start;
    }
    .seo-fix-row .edit-input { flex: 1; }

    .seo-confirm-btn {
      background: #22c55e;
      border: none;
      color: #fff;
      border-radius: 5px;
      padding: 0.28rem 0.7rem;
      font-size: 0.71rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .seo-confirm-btn:hover { background: #16a34a; }
    .seo-confirm-btn:disabled { background: #1e2435; color: #3d4a63; cursor: not-allowed; }

    .seo-applied-tag {
      font-size: 0.7rem;
      color: #22c55e;
      font-weight: 600;
      padding-left: 1.4rem;
      margin-top: 0.35rem;
      display: block;
    }

    .seo-manual-note {
      font-size: 0.69rem;
      color: #3d4a63;
      padding-left: 1.4rem;
      margin-top: 0.2rem;
    }

    .seo-detail-footer {
      padding: 0.65rem 1.25rem;
      border-top: 1px solid #1e2435;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .seo-gen-all-btn {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      color: #fff;
      border-radius: 7px;
      padding: 0.42rem 1rem;
      font-size: 0.76rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .seo-gen-all-btn:hover { opacity: 0.85; }
    .seo-gen-all-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .seo-loading {
      padding: 2.5rem;
      text-align: center;
      color: #3d4a63;
      font-size: 0.8rem;
    }

    .review-actions {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .apply-btn {
      background: #4f6ef7;
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 0.45rem 1.1rem;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .apply-btn:hover { background: #6b85f8; }
    .apply-btn:disabled { background: #1e2435; color: #3d4a63; cursor: not-allowed; }

    .select-all-btn {
      background: none;
      border: 1px solid #1e2435;
      color: #475569;
      border-radius: 5px;
      padding: 0.35rem 0.65rem;
      font-size: 0.75rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .select-all-btn:hover { border-color: #4f6ef7; color: #818cf8; }

    .review-count {
      font-size: 0.72rem;
      color: #3d4a63;
      margin-left: auto;
    }

    /* ── Output box ──────────────────────────────────────────── */

    .output-wrap {
      flex: 1;
      min-height: 0;
      padding: 0.75rem 1.25rem 1.25rem;
    }

    .output-box {
      height: 100%;
      background: #0a0d14;
      border: 1px solid #1e2435;
      border-radius: 10px;
      padding: 1rem;
      overflow-y: auto;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 0.8rem;
      line-height: 1.65;
    }

    .output-box .placeholder {
      color: #2a3145;
      font-style: italic;
    }

    .line { display: flex; gap: 0.5rem; }
    .line.err { color: #f87171; }
    .line.out { color: #94a3b8; }
    .line .prefix { color: #252b3d; flex-shrink: 0; }
  </style>
</head>
<body>

<div class="app">

  <!-- ── Sidebar ───────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">⚡</span>
      <div>
        <div class="sidebar-title">WP Optimizer</div>
        <div class="sidebar-subtitle">localhost WordPress</div>
      </div>
    </div>

    <nav class="nav">

      <button class="nav-item nav-status" data-cmd="get-status">
        <span class="nav-item-icon">✨</span>
        <div class="nav-item-body">
          <span class="nav-item-label">Site Status</span>
          <span class="nav-item-note">KI-Gesamtbericht · Links · SEO · Media</span>
        </div>
        <span class="nav-state" id="state-get-status">Bereit</span>
      </button>

      <div class="nav-divider"></div>

      <button class="nav-item" data-cmd="test-connection">
        <span class="nav-item-icon">🔌</span>
        <div class="nav-item-body">
          <span class="nav-item-label">Test Connection</span>
        </div>
        <span class="nav-state" id="state-test-connection">Bereit</span>
      </button>

      <button class="nav-item" data-cmd="check-links">
        <span class="nav-item-icon">🔗</span>
        <div class="nav-item-body">
          <span class="nav-item-label">Check Links</span>
          <span class="nav-item-note">Nur Analyse — kein Auto-Fix</span>
        </div>
        <span class="nav-state" id="state-check-links">Bereit</span>
      </button>

      <button class="nav-item" data-cmd="audit-seo">
        <span class="nav-item-icon">📈</span>
        <div class="nav-item-body">
          <span class="nav-item-label">SEO Audit</span>
          <span class="nav-item-note">KI-Optimierung pro Beitrag</span>
        </div>
        <span class="nav-state" id="state-audit-seo">Bereit</span>
      </button>

      <button class="nav-item" data-cmd="audit-media">
        <span class="nav-item-icon">🖼️</span>
        <div class="nav-item-body">
          <span class="nav-item-label">Media Audit</span>
        </div>
        <span class="nav-state" id="state-audit-media">Bereit</span>
      </button>
      <div class="nav-options">
        <label class="nav-option" onclick="event.stopPropagation()">
          <input type="checkbox" id="opt-fix" autocomplete="off">
          <span>Alt-Texte generieren</span>
          <span class="ai-badge">AI</span>
        </label>
        <label class="nav-option" onclick="event.stopPropagation()">
          <input type="checkbox" id="opt-media-ai" autocomplete="off">
          <span>KI-Qualität prüfen</span>
          <span class="ai-badge">AI</span>
        </label>
      </div>

    </nav>

    <div class="sidebar-footer">
      <button class="abort-btn" id="abort-btn" onclick="abortCurrent()">■ Abbrechen</button>
    </div>
  </aside>

  <!-- ── Main ─────────────────────────────────────────────── -->
  <main class="main">

    <div class="main-toolbar">
      <span class="main-label" id="toolbar-label">Bereit — wähle ein Tool</span>
      <div class="main-actions">
        <button class="tool-btn" id="copy-btn" onclick="copyOutput()">Kopieren</button>
        <button class="tool-btn" onclick="clearOutput()">Leeren</button>
      </div>
    </div>

    <div class="report-box" id="report-box"></div>

    <div class="review-panel" id="review-panel">
      <div class="review-panel-header">
        <h3>Alt-Texte überprüfen</h3>
        <button class="close-btn" onclick="document.getElementById('review-panel').style.display='none'" title="Schließen">✕</button>
      </div>
      <p id="review-desc">Wähle die Änderungen aus, die du anwenden möchtest.</p>
      <div class="review-list" id="review-list"></div>
      <div class="review-actions">
        <button class="select-all-btn" id="select-all-btn" onclick="toggleSelectAll()">Alle abwählen</button>
        <button class="apply-btn" id="apply-btn" onclick="applySelectedFixes()">Fixes anwenden</button>
        <span class="review-count" id="review-count"></span>
      </div>
    </div>

    <!-- SEO structured view -->
    <div class="seo-view" id="seo-view">

      <!-- List subview -->
      <div id="seo-list-view">
        <div class="seo-view-toolbar">
          <span class="seo-view-heading" id="seo-list-heading">SEO Audit</span>
          <span class="seo-avg-label" id="seo-avg-label"></span>
        </div>
        <div class="seo-scroll" id="seo-items-list">
          <div class="seo-loading">Lade…</div>
        </div>
      </div>

      <!-- Detail subview -->
      <div id="seo-detail-view" style="display:none; flex:1; min-height:0; display:none; flex-direction:column;">
        <div class="seo-view-toolbar">
          <button class="seo-back-btn" onclick="showSeoList()">← Übersicht</button>
          <span class="seo-view-heading" id="seo-detail-heading"></span>
          <span class="seo-detail-score" id="seo-detail-score"></span>
        </div>
        <div class="seo-scroll" id="seo-issues-list"></div>
        <div class="seo-detail-footer">
          <button class="seo-gen-all-btn" onclick="generateAllSeoFixes()">Alle KI-Felder generieren</button>
        </div>
      </div>

    </div>

    <div class="output-wrap">
      <div class="output-box" id="output">
        <span class="placeholder">Wähle links ein Tool um es auszuführen.</span>
      </div>
    </div>

  </main>
</div>

<script>
  let lineCount = 0;
  let activeEs = null;

  // ── State helpers ────────────────────────────────────────────

  function setNavState(cmd, state, text) {
    const item = document.querySelector(`.nav-item[data-cmd="${cmd}"]`);
    const stateEl = document.getElementById(`state-${cmd}`);
    if (item) item.dataset.state = state;
    if (stateEl) stateEl.textContent = text;
  }

  function resetNavState(cmd) {
    setTimeout(() => setNavState(cmd, '', 'Bereit'), 4000);
  }

  // ── Abort ─────────────────────────────────────────────────────

  function setActiveEs(es) {
    activeEs = es;
    document.getElementById('abort-btn').style.display = '';
  }

  function clearActiveEs() {
    activeEs = null;
    document.getElementById('abort-btn').style.display = 'none';
  }

  function abortCurrent() {
    if (activeEs) { activeEs.close(); activeEs = null; }
    clearActiveEs();
    document.querySelectorAll('.nav-item[data-state="running"]').forEach(item => {
      item.dataset.state = '';
      const stateEl = item.querySelector('.nav-state') || document.getElementById(`state-${item.dataset.cmd}`);
      if (stateEl) stateEl.textContent = 'Bereit';
    });
    appendLine('Abgebrochen.', 'err');
  }

  // ── Output ───────────────────────────────────────────────────

  function clearOutput() {
    document.getElementById('output').innerHTML = '<span class="placeholder">Wähle links ein Tool um es auszuführen.</span>';
    lineCount = 0;
  }

  async function copyOutput() {
    const lines = [...document.querySelectorAll('#output .line span:last-child')];
    const text = lines.map(l => l.textContent).join('\n');
    if (!text) return;
    await navigator.clipboard.writeText(text);
    const btn = document.getElementById('copy-btn');
    const orig = btn.textContent;
    btn.textContent = 'Kopiert ✓';
    setTimeout(() => { btn.textContent = orig; }, 1500);
  }

  function appendLine(text, type) {
    const box = document.getElementById('output');
    const placeholder = box.querySelector('.placeholder');
    if (placeholder) placeholder.remove();
    const div = document.createElement('div');
    div.className = `line ${type}`;
    div.innerHTML = `<span class="prefix">${String(++lineCount).padStart(3, '0')}</span><span>${escapeHtml(text)}</span>`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Status card (get-status) ─────────────────────────────────

  document.querySelector('.nav-status').addEventListener('click', () => {
    const cmd = 'get-status';
    if (document.querySelector('.nav-status').dataset.state === 'running') return;

    hideSeoView();
    setNavState(cmd, 'running', 'Läuft…');
    document.getElementById('toolbar-label').textContent = 'Ausgabe: Site Status';
    const reportBox = document.getElementById('report-box');
    reportBox.style.display = 'none';
    reportBox.textContent = '';

    const es = new EventSource('/run/get-status');
    setActiveEs(es);
    let reportLines = [], inReport = false;

    es.onmessage = (e) => {
      const { type, text } = JSON.parse(e.data);
      if (type === 'done') {
        es.close(); clearActiveEs();
        if (reportLines.length > 0) {
          reportBox.textContent = reportLines.join('\n');
          reportBox.style.display = 'block';
        }
        setNavState(cmd, text === 'success' ? 'success' : 'error', text === 'success' ? 'Fertig' : 'Fehler');
        resetNavState(cmd);
      } else {
        if (text.includes('__REPORT_START__')) { inReport = true; return; }
        if (text.includes('__REPORT_END__'))   { inReport = false; return; }
        if (inReport) reportLines.push(text);
        appendLine(text, type);
      }
    };
    es.onerror = () => { es.close(); clearActiveEs(); setNavState(cmd, 'error', 'Fehler'); };
  });

  // ── SEO View ─────────────────────────────────────────────────

  let currentSeoItem = null;

  function showSeoView() {
    document.getElementById('seo-view').style.display = 'flex';
    document.querySelector('.output-wrap').style.display = 'none';
    document.getElementById('review-panel').style.display = 'none';
  }

  function hideSeoView() {
    document.getElementById('seo-view').style.display = 'none';
    document.querySelector('.output-wrap').style.display = '';
  }

  function showSeoList() {
    document.getElementById('seo-list-view').style.display = '';
    document.getElementById('seo-detail-view').style.display = 'none';
  }

  function showSeoDetail(item) {
    currentSeoItem = item;
    document.getElementById('seo-list-view').style.display = 'none';
    const dv = document.getElementById('seo-detail-view');
    dv.style.display = 'flex';
    renderSeoDetail(item);
  }

  function scoreClass(score) {
    if (score < 50) return 'score-red';
    if (score < 75) return 'score-yellow';
    return 'score-green';
  }

  async function loadSeoAudit() {
    showSeoView();
    showSeoList();
    setNavState('audit-seo', 'running', 'Läuft…');
    document.getElementById('toolbar-label').textContent = 'SEO Audit';
    const listEl = document.getElementById('seo-items-list');
    listEl.innerHTML = '<div class="seo-loading">Analysiere Beiträge und Seiten…</div>';
    try {
      const resp = await fetch('/api/seo-audit');
      if (!resp.ok) throw new Error(await resp.text());
      const items = await resp.json();
      const avg = items.length ? Math.round(items.reduce((s, i) => s + i.score, 0) / items.length) : 0;
      document.getElementById('seo-avg-label').textContent = `Ø ${avg}/100 · ${items.length} Einträge`;
      listEl.innerHTML = '';
      items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'seo-list-item';
        div.dataset.id = item.id;
        const issueText = item.issues.length
          ? item.issues.slice(0, 2).join(' · ') + (item.issues.length > 2 ? ` +${item.issues.length - 2}` : '')
          : 'Keine kritischen Probleme';
        div.innerHTML = `
          <span class="score-pill ${scoreClass(item.score)}">${item.score}</span>
          <div class="seo-list-body">
            <div class="seo-list-title">${escapeHtml(item.title)}</div>
            <div class="seo-list-issues">${escapeHtml(issueText)}</div>
          </div>
          ${item.isNoindex ? '<span class="seo-noindex-tag">noindex</span>' : ''}
          <span class="seo-type-tag">${item.type}</span>
          <span class="seo-chevron">›</span>`;
        div.addEventListener('click', () => showSeoDetail(item));
        listEl.appendChild(div);
      });
      setNavState('audit-seo', 'success', 'Fertig');
      resetNavState('audit-seo');
    } catch (err) {
      listEl.innerHTML = `<div class="seo-loading" style="color:#ef4444">Fehler: ${escapeHtml(err.message)}</div>`;
      setNavState('audit-seo', 'error', 'Fehler');
    }
  }

  function renderSeoDetail(item) {
    document.getElementById('seo-detail-heading').textContent = item.title;
    const scoreEl = document.getElementById('seo-detail-score');
    scoreEl.className = `seo-detail-score score-pill ${scoreClass(item.score)}`;
    scoreEl.textContent = `${item.score}/100`;
    const issuesEl = document.getElementById('seo-issues-list');
    issuesEl.innerHTML = '';

    // AI-fixable fields
    [
      { field: 'title',     label: 'Yoast SEO Titel',       current: item.currentYoastTitle,  emptyHint: '(kein Yoast SEO Titel)' },
      { field: 'excerpt',   label: 'Yoast Meta Description', current: item.currentYoastDesc,   emptyHint: '(keine Meta Description)' },
      { field: 'keyphrase', label: 'Fokus-Keyphrase',        current: item.currentKeyphrase,   emptyHint: '(keine Keyphrase gesetzt)' },
      { field: 'h1',        label: 'H1-Überschrift',         current: item.currentH1,          emptyHint: item.headingFormat ? `(kein H1 – gefunden: ${item.headingFormat.tag.toUpperCase()}${item.headingFormat.classes ? ' · ' + item.headingFormat.classes : ''})` : '(kein H1 gefunden)', headingFormat: item.headingFormat },
      { field: 'intro',     label: 'Einleitung (erster Absatz)', current: item.currentIntro,   emptyHint: '(kein erster Absatz gefunden)' },
    ].forEach(({ field, label, current, emptyHint, headingFormat }) => {
      const issue = field === 'title'
        ? item.issues.find(i => /title/i.test(i)) || ''
        : field === 'h1'
        ? item.issues.find(i => /h1|heading/i.test(i)) || ''
        : field === 'intro'
        ? item.issues.find(i => /first paragraph|einleitung/i.test(i)) || ''
        : item.issues.find(i => /excerpt|meta description/i.test(i)) || '';

      let conversionNote = '';
      if (field === 'h1' && headingFormat?.needsConversion) {
        const classInfo = headingFormat.classes ? ` · Klassen: <code>${escapeHtml(headingFormat.classes)}</code>` : '';
        conversionNote = `<div class="seo-manual-note" style="color:#818cf8;margin-top:0.25rem">` +
          `${headingFormat.tag.toUpperCase()} wird zu H1 konvertiert – CSS-Klassen bleiben erhalten${classInfo}</div>`;
      } else if (field === 'h1' && headingFormat?.isH1 && headingFormat.classes) {
        conversionNote = `<div class="seo-manual-note" style="margin-top:0.25rem">` +
          `CSS-Klassen: <code>${escapeHtml(headingFormat.classes)}</code></div>`;
      }

      const div = document.createElement('div');
      div.className = 'seo-issue-item';
      div.id = `seo-item-${item.id}-${field}`;
      div.innerHTML = `
        <div class="seo-issue-header">
          <span class="seo-issue-icon">${issue ? '✗' : '✓'}</span>
          <span class="seo-issue-label">${label}</span>
          <button class="seo-fix-btn" onclick="requestSeoFix(${item.id},'${item.type}','${field}',this)">Mit KI optimieren</button>
        </div>
        ${issue ? `<div class="seo-issue-sub">${escapeHtml(issue)}</div>` : ''}
        <div class="seo-current-val" id="seo-cur-${item.id}-${field}">Aktuell: ${current ? escapeHtml(current) : `<em>${emptyHint}</em>`}</div>
        ${conversionNote}
        <div class="seo-fix-row" id="seo-row-${item.id}-${field}">
          ${field === 'excerpt'
            ? `<textarea class="edit-input" id="seo-inp-${item.id}-${field}" rows="2" placeholder="KI-Vorschlag…"></textarea>`
            : field === 'intro'
            ? `<textarea class="edit-input" id="seo-inp-${item.id}-${field}" rows="3" placeholder="KI-Vorschlag…"></textarea>`
            : `<input type="text" class="edit-input" id="seo-inp-${item.id}-${field}" placeholder="KI-Vorschlag…">`}
          <button class="seo-confirm-btn" onclick="applySeoFixItem(${item.id},'${item.type}','${field}',this)">✓ Übernehmen</button>
        </div>`;
      issuesEl.appendChild(div);
    });

    // Content extension (only shown when content is too short)
    const contentIssue = item.issues.find(i => /content too short|content could be longer/i.test(i));
    if (contentIssue) {
      const div = document.createElement('div');
      div.className = 'seo-issue-item';
      div.id = `seo-item-${item.id}-content`;
      div.innerHTML = `
        <div class="seo-issue-header">
          <span class="seo-issue-icon">✗</span>
          <span class="seo-issue-label">Inhalt</span>
          <button class="seo-fix-btn" onclick="requestSeoFix(${item.id},'${item.type}','content',this)">Mit KI erweitern</button>
        </div>
        <div class="seo-issue-sub">${escapeHtml(contentIssue)}</div>
        <div class="seo-current-val" id="seo-cur-${item.id}-content">Aktuell: ${item.wordCount} Wörter</div>
        <div class="seo-fix-row" id="seo-row-${item.id}-content">
          <textarea class="edit-input" id="seo-inp-${item.id}-content" rows="4" placeholder="KI-Erweiterung…"></textarea>
          <button class="seo-confirm-btn" onclick="applySeoFixItem(${item.id},'${item.type}','content',this)">✓ Einfügen</button>
        </div>`;
      issuesEl.appendChild(div);
    }

    // Permalink suggestion
    const permalinkDiv = document.createElement('div');
    permalinkDiv.className = 'seo-issue-item';
    const keyphrase = item.currentKeyphrase || '';
    const suggestedSlug = keyphrase ? keyphraseToSlug(keyphrase) : '';
    permalinkDiv.innerHTML = `
      <div class="seo-issue-header">
        <span class="seo-issue-icon" style="color:#4f6ef7">🔗</span>
        <span class="seo-issue-label">Permalink-Vorschlag</span>
      </div>
      <div class="seo-current-val">Aktuell: ${escapeHtml(item.url?.replace(/^https?:\/\/[^/]+/, '') || '')}</div>
      ${suggestedSlug
        ? `<div class="seo-fix-row" style="display:flex;margin-top:0.35rem">
            <input type="text" class="edit-input" value="${escapeHtml(suggestedSlug)}" id="seo-slug-${item.id}" readonly style="color:#818cf8;cursor:text">
            <button class="seo-confirm-btn" style="background:#1e2435;color:#818cf8;border:1px solid #2a3450"
              onclick="navigator.clipboard.writeText(document.getElementById('seo-slug-${item.id}').value);this.textContent='✓ Kopiert';setTimeout(()=>this.textContent='Kopieren',1500)">Kopieren</button>
           </div>
           <div class="seo-manual-note" style="margin-top:0.3rem">Permalink manuell im WP-Editor ändern · Redirect für die alte URL einrichten</div>`
        : `<div class="seo-manual-note">Keyphrase generieren um einen Vorschlag zu erhalten</div>`
      }`;
    issuesEl.appendChild(permalinkDiv);

    // Image alt texts
    const imgDiv = document.createElement('div');
    imgDiv.className = 'seo-issue-item';
    imgDiv.innerHTML = `
      <div class="seo-issue-header">
        <span class="seo-issue-icon" style="color:#4f6ef7">🖼</span>
        <span class="seo-issue-label">Bild-Alt-Texte (Keyphrase)</span>
        <button class="seo-fix-btn" id="seo-img-btn-${item.id}"
          onclick="loadSeoImages(currentSeoItem)">Keyphrase-Abdeckung prüfen</button>
      </div>
      <div class="seo-issue-sub">Bilder deren Alt-Text keine Keyphrase-Wörter enthält, werden optimiert.</div>
      <div style="margin-top:0.4rem" id="seo-img-list-${item.id}"></div>`;
    issuesEl.appendChild(imgDiv);

    // Noindex toggle
    const robotsDiv = document.createElement('div');
    robotsDiv.className = `seo-robots-item${item.isNoindex ? ' is-noindex' : ''}`;
    robotsDiv.id = `seo-robots-${item.id}`;
    const toggleId = `noindex-toggle-${item.id}`;
    robotsDiv.innerHTML = `
      <label class="seo-toggle">
        <input type="checkbox" id="${toggleId}" ${item.isNoindex ? 'checked' : ''}
          onchange="toggleNoindex(${item.id},'${item.type}',this)">
        <span class="seo-toggle-track"></span>
      </label>
      <div class="seo-robots-label">
        <strong>Aus Suchindex ausschließen (noindex)</strong>
        <span id="seo-robots-hint-${item.id}">${item.isNoindex ? 'Seite wird nicht indexiert' : 'Seite wird normal indexiert'}</span>
      </div>`;
    issuesEl.appendChild(robotsDiv);

    // Manual issues (exclude anything handled by AI-fix cards above)
    item.issues
      .filter(i => !/title|excerpt|meta description|h1|heading|content too short|content could be longer|first paragraph/i.test(i))
      .forEach(issue => {
        const div = document.createElement('div');
        div.className = 'seo-issue-item';
        div.innerHTML = `
          <div class="seo-issue-header">
            <span class="seo-issue-icon">⚠</span>
            <span class="seo-issue-label" style="color:#f59e0b">${escapeHtml(issue)}</span>
          </div>
          <div class="seo-manual-note">Manuelle Bearbeitung im WordPress-Editor erforderlich</div>`;
        issuesEl.appendChild(div);
      });
  }

  async function requestSeoFix(id, type, field, btnEl) {
    btnEl.disabled = true;
    btnEl.textContent = 'Generiert…';
    try {
      const resp = await fetch(`/api/seo-fix?id=${id}&type=${type}&field=${field}`);
      const { value, error } = await resp.json();
      if (error) throw new Error(error);
      if (value) {
        const inp = document.getElementById(`seo-inp-${id}-${field}`);
        const row = document.getElementById(`seo-row-${id}-${field}`);
        inp.value = value;
        row.style.display = 'flex';
        btnEl.textContent = 'Neu generieren';
        btnEl.disabled = false;
      } else {
        btnEl.textContent = 'Kein Ergebnis';
        setTimeout(() => { btnEl.textContent = 'Mit KI optimieren'; btnEl.disabled = false; }, 2000);
      }
    } catch (err) {
      btnEl.textContent = 'Fehler – Retry';
      btnEl.disabled = false;
    }
  }

  async function applySeoFixItem(id, type, field, btnEl) {
    const inp = document.getElementById(`seo-inp-${id}-${field}`);
    const value = inp?.value?.trim();
    if (!value) return;
    btnEl.disabled = true;
    btnEl.textContent = 'Speichert…';
    try {
      const resp = await fetch('/apply/audit-seo', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ changes: [{ id, type, field, value }] }),
      });
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buf = '', success = false;
      while (true) {
        const { value: chunk, done } = await reader.read();
        if (done) break;
        buf += decoder.decode(chunk, { stream: true });
        const parts = buf.split('\n\n'); buf = parts.pop();
        for (const part of parts) {
          const line = part.replace(/^data: /, '').trim();
          if (!line) continue;
          const msg = JSON.parse(line);
          if (msg.type === 'done') success = msg.text === 'success';
        }
      }
      if (success) {
        btnEl.closest('.seo-fix-row').style.display = 'none';
        const issueItem = document.getElementById(`seo-item-${id}-${field}`);
        issueItem.classList.add('is-applied');
        const curEl = document.getElementById(`seo-cur-${id}-${field}`);
        if (field === 'content') {
          if (curEl) curEl.innerHTML = 'Inhalt wurde erweitert';
        } else {
          if (curEl) curEl.innerHTML = `Aktuell: ${escapeHtml(value)}`;
        }
        const icon = issueItem.querySelector('.seo-issue-icon');
        if (icon) icon.textContent = '✓';
        const tag = document.createElement('span');
        tag.className = 'seo-applied-tag';
        tag.textContent = '✓ Gespeichert';
        issueItem.appendChild(tag);
        if (field === 'h1' || field === 'content' || field === 'intro') {
          const hint = document.createElement('span');
          hint.className = 'seo-manual-note';
          hint.style.color = '#f59e0b';
          hint.textContent = '↺ WordPress-Editor neu laden um die Änderung zu sehen';
          issueItem.appendChild(hint);
        }
      } else {
        btnEl.textContent = 'Fehler';
        setTimeout(() => { btnEl.textContent = '✓ Übernehmen'; btnEl.disabled = false; }, 2000);
      }
    } catch {
      btnEl.textContent = 'Fehler';
      setTimeout(() => { btnEl.textContent = '✓ Übernehmen'; btnEl.disabled = false; }, 2000);
    }
  }

  async function toggleNoindex(id, type, checkboxEl) {
    const noindex = checkboxEl.checked;
    const hintEl = document.getElementById(`seo-robots-hint-${id}`);
    const containerEl = document.getElementById(`seo-robots-${id}`);
    checkboxEl.disabled = true;
    try {
      const resp = await fetch('/api/seo-noindex', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, type, noindex }),
      });
      const { success, error } = await resp.json();
      if (!success) throw new Error(error);
      containerEl.classList.toggle('is-noindex', noindex);
      if (hintEl) hintEl.textContent = noindex ? 'Seite wird nicht indexiert' : 'Seite wird normal indexiert';
      // update badge in list
      const listItem = document.querySelector(`.seo-list-item[data-id="${id}"]`);
      if (listItem) {
        let badge = listItem.querySelector('.seo-noindex-tag');
        if (noindex && !badge) {
          badge = document.createElement('span');
          badge.className = 'seo-noindex-tag';
          badge.textContent = 'noindex';
          listItem.querySelector('.seo-type-tag').before(badge);
        } else if (!noindex && badge) {
          badge.remove();
        }
      }
    } catch {
      checkboxEl.checked = !noindex; // revert
    } finally {
      checkboxEl.disabled = false;
    }
  }

  function keyphraseToSlug(phrase) {
    const map = { ä:'ae', ö:'oe', ü:'ue', ß:'ss', à:'a', á:'a', â:'a', è:'e', é:'e', ê:'e', ì:'i', í:'i', ò:'o', ó:'o', ù:'u', ú:'u' };
    return phrase.toLowerCase()
      .replace(/[äöüßàáâèéêìíòóùú]/g, c => map[c] || c)
      .replace(/[^a-z0-9\s]/g, '')
      .trim()
      .replace(/\s+/g, '-');
  }

  async function loadSeoImages(item) {
    const keyphrase = document.getElementById(`seo-inp-${item.id}-keyphrase`)?.value?.trim() || item.currentKeyphrase;
    const btn = document.getElementById(`seo-img-btn-${item.id}`);
    const listEl = document.getElementById(`seo-img-list-${item.id}`);
    if (!keyphrase) {
      listEl.innerHTML = '<span style="color:#f59e0b;font-size:0.72rem">Bitte zuerst eine Keyphrase generieren oder eingeben.</span>';
      return;
    }
    btn.disabled = true;
    btn.textContent = 'Prüft…';
    listEl.innerHTML = '';
    try {
      const resp = await fetch(`/api/seo-images?id=${item.id}&type=${item.type}&keyphrase=${encodeURIComponent(keyphrase)}`);
      const proposals = await resp.json();
      if (!proposals.length) {
        listEl.innerHTML = '<span style="color:#22c55e;font-size:0.72rem">✓ Alle Bilder enthalten bereits Keyphrase-Wörter.</span>';
      } else {
        proposals.forEach(p => {
          const div = document.createElement('div');
          div.style.cssText = 'background:#0f1117;border:1px solid #1e2435;border-radius:6px;padding:0.5rem 0.65rem;margin-bottom:0.3rem;';
          div.innerHTML = `
            <div style="font-size:0.72rem;color:#475569;margin-bottom:0.2rem">${escapeHtml(p.filename)}</div>
            <div style="font-size:0.7rem;color:#3d4a63;margin-bottom:0.25rem">
              <span style="color:#ef4444;text-decoration:line-through">${escapeHtml(p.currentAlt || '(leer)')}</span>
              <span style="color:#4f6ef7;margin:0 0.3rem">→</span>
              <span style="color:#22c55e">${escapeHtml(p.proposedAlt)}</span>
            </div>
            <button class="seo-confirm-btn" style="font-size:0.68rem;padding:0.2rem 0.5rem"
              onclick="applySeoImageFix(${p.imageId},'${escapeHtml(p.proposedAlt).replace(/'/g,"\\'")}',this)">✓ Übernehmen</button>`;
          listEl.appendChild(div);
        });
      }
      btn.textContent = 'Neu prüfen';
    } catch (err) {
      listEl.innerHTML = `<span style="color:#ef4444;font-size:0.72rem">Fehler: ${escapeHtml(err.message)}</span>`;
      btn.textContent = 'Keyphrase-Abdeckung prüfen';
    }
    btn.disabled = false;
  }

  async function applySeoImageFix(imageId, proposedAlt, btnEl) {
    btnEl.disabled = true;
    btnEl.textContent = 'Speichert…';
    try {
      const resp = await fetch('/apply/audit-seo', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ changes: [{ id: imageId, type: 'media', field: 'alt_text', value: proposedAlt }] }),
      });
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buf = '', success = false;
      while (true) {
        const { value: chunk, done } = await reader.read();
        if (done) break;
        buf += decoder.decode(chunk, { stream: true });
        const parts = buf.split('\n\n'); buf = parts.pop();
        for (const part of parts) {
          const line = part.replace(/^data: /, '').trim();
          if (!line) continue;
          const msg = JSON.parse(line);
          if (msg.type === 'done') success = msg.text === 'success';
        }
      }
      btnEl.textContent = success ? '✓ Gespeichert' : 'Fehler';
      if (success) btnEl.style.background = '#15803d';
    } catch {
      btnEl.textContent = 'Fehler';
      btnEl.disabled = false;
    }
  }

  function generateAllSeoFixes() {
    document.querySelectorAll('.seo-fix-btn:not([disabled])').forEach(b => b.click());
  }

  // ── Media Review Panel ───────────────────────────────────────

  function updateReviewCount() {
    const total = document.querySelectorAll('#review-list .review-item').length;
    const selected = document.querySelectorAll('#review-list .review-item input:checked').length;
    document.getElementById('review-count').textContent = `${selected} von ${total} ausgewählt`;
    document.getElementById('apply-btn').disabled = selected === 0;
    document.getElementById('select-all-btn').textContent =
      selected === total ? 'Alle abwählen' : 'Alle auswählen';
  }

  function toggleSelectAll() {
    const items = document.querySelectorAll('#review-list .review-item input');
    const allChecked = [...items].every(cb => cb.checked);
    items.forEach(cb => {
      cb.checked = !allChecked;
      cb.closest('.review-item').classList.toggle('deselected', allChecked);
    });
    updateReviewCount();
  }

  function showReviewPanel(proposals) {
    const list = document.getElementById('review-list');
    list.innerHTML = '';
    const truncate = (s, n) => s && s.length > n ? s.substring(0, n) + '…' : (s || '');
    proposals.forEach(p => {
      const item = document.createElement('div');
      item.className = 'review-item';
      item.dataset.id = p.id;
      item.innerHTML = `
        <input type="checkbox" checked onchange="this.closest('.review-item').classList.toggle('deselected', !this.checked); updateReviewCount()">
        <div class="review-item-body">
          <div class="review-item-filename">${escapeHtml(p.filename)}</div>
          <div class="review-item-change">
            <span class="from">${p.currentAltText ? escapeHtml(truncate(p.currentAltText, 60)) : '(leer)'}</span>
            <span class="arrow">→</span>
            <span class="to">${escapeHtml(truncate(p.proposedAltText, 60))}</span>
          </div>
          <div class="review-item-edit">
            <input type="text" class="edit-input" value="${escapeHtml(p.proposedAltText)}" placeholder="Alt-Text bearbeiten…">
          </div>
        </div>`;
      item.querySelector('.edit-input').addEventListener('click', e => e.stopPropagation());
      item.addEventListener('click', (e) => {
        if (e.target.matches('input[type="checkbox"], .edit-input')) return;
        const cb = item.querySelector('input[type="checkbox"]');
        cb.checked = !cb.checked;
        item.classList.toggle('deselected', !cb.checked);
        updateReviewCount();
      });
      list.appendChild(item);
    });
    document.getElementById('review-panel').style.display = 'block';
    updateReviewCount();
  }

  async function applySelectedFixes() {
    const changes = [...document.querySelectorAll('#review-list .review-item input[type="checkbox"]:checked')]
      .map(cb => {
        const item = cb.closest('.review-item');
        const editInput = item.querySelector('.edit-input');
        const altText = editInput ? editInput.value.trim() : item.dataset.altText;
        return { id: parseInt(item.dataset.id, 10), altText };
      })
      .filter(c => c.altText);
    const btn = document.getElementById('apply-btn');
    btn.disabled = true; btn.textContent = 'Wird angewendet…';
    document.getElementById('toolbar-label').textContent = 'Ausgabe: audit-media (Apply)';
    setNavState('audit-media', 'running', 'Läuft...');

    const response = await fetch('/apply/audit-media', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ changes }),
    });
    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const parts = buffer.split('\n\n'); buffer = parts.pop();
      for (const part of parts) {
        const line = part.replace(/^data: /, '').trim();
        if (!line) continue;
        const { type, text } = JSON.parse(line);
        if (type === 'done') {
          document.getElementById('review-panel').style.display = 'none';
          setNavState('audit-media', text === 'success' ? 'success' : 'error', text === 'success' ? 'Fertig' : 'Fehler');
          resetNavState('audit-media');
        } else { appendLine(text, type); }
      }
    }
    btn.textContent = 'Fixes anwenden';
  }

  // ── Nav item click handler ───────────────────────────────────

  document.querySelectorAll('.nav-item[data-cmd]:not(.nav-status)').forEach(navItem => {
    navItem.addEventListener('click', async () => {
      if (navItem.dataset.state === 'running') return;

      const cmd = navItem.dataset.cmd;

      // SEO Audit → new structured view
      if (cmd === 'audit-seo') { loadSeoAudit(); return; }

      // All other tools → hide SEO view, show terminal
      hideSeoView();

      const wantsFix       = cmd === 'audit-media' && document.getElementById('opt-fix')?.checked;
      const wantsAiQuality = cmd === 'audit-media' && document.getElementById('opt-media-ai')?.checked;
      const wantsSeoFix    = false; // handled above

      setNavState(cmd, 'running', 'Läuft...');
      document.getElementById('toolbar-label').textContent = `Ausgabe: ${cmd}`;

      // ── Media: AI quality check ────────────────────────────

      if (wantsAiQuality) {
        setNavState(cmd, 'running', 'KI analysiert…');
        document.getElementById('review-panel').style.display = 'none';
        const es = new EventSource('/preview/audit-media-ai');
        setActiveEs(es);
        es.onmessage = (e) => {
          const msg = JSON.parse(e.data);
          if (msg.type === 'progress') {
            appendLine(msg.text, 'out');
          } else if (msg.type === 'proposals') {
            es.close(); clearActiveEs();
            const proposals = msg.data || [];
            if (proposals.length === 0) {
              appendLine('Alle Alt-Texte sind qualitativ in Ordnung.', 'out');
              setNavState(cmd, 'success', 'Fertig'); resetNavState(cmd);
            } else {
              appendLine(`${proposals.length} verbesserungswürdige Alt-Texte gefunden.`, 'out');
              document.getElementById('review-desc').textContent =
                'Claude hat diese Alt-Texte als unzureichend bewertet.';
              showReviewPanel(proposals);
              setNavState(cmd, '', 'Bereit');
            }
          } else if (msg.type === 'done' && msg.text === 'error') {
            es.close(); clearActiveEs(); setNavState(cmd, 'error', 'Fehler');
          } else if (msg.type === 'err') { appendLine(msg.text, 'err'); }
        };
        es.onerror = () => { es.close(); clearActiveEs(); setNavState(cmd, 'error', 'Fehler'); };
        return;
      }

      // ── Media: Alt-Text generation ─────────────────────────

      if (wantsFix) {
        document.getElementById('review-panel').style.display = 'none';
        const es = new EventSource('/run/audit-media');
        setActiveEs(es);
        es.onmessage = (e) => {
          const { type, text } = JSON.parse(e.data);
          if (type === 'done') {
            es.close(); clearActiveEs();
            if (text !== 'success') { setNavState(cmd, 'error', 'Fehler'); return; }
            setNavState(cmd, '', 'Bereit');
            fetch('/preview/audit-media')
              .then(r => r.json())
              .then(proposals => {
                if (proposals.length === 0) { appendLine('Keine fehlenden Alt-Texte gefunden.', 'out'); return; }
                appendLine(`${proposals.length} fehlende Alt-Texte gefunden. Bitte überprüfen:`, 'out');
                showReviewPanel(proposals);
              })
              .catch(err => appendLine(`Vorschau fehlgeschlagen: ${err.message}`, 'err'));
          } else { appendLine(text, type); }
        };
        es.onerror = () => { es.close(); clearActiveEs(); setNavState(cmd, 'error', 'Fehler'); };
        return;
      }

      // ── Generic handler ────────────────────────────────────

      const es = new EventSource(`/run/${cmd}`);
      setActiveEs(es);
      es.onmessage = (e) => {
        const { type, text } = JSON.parse(e.data);
        if (type === 'done') {
          es.close(); clearActiveEs();
          setNavState(cmd, text === 'success' ? 'success' : 'error', text === 'success' ? 'Fertig' : 'Fehler');
          resetNavState(cmd);
        } else { appendLine(text, type); }
      };
      es.onerror = () => { es.close(); clearActiveEs(); setNavState(cmd, 'error', 'Fehler'); };
    });
  });
</script>
